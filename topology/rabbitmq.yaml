# RabbitMQ Topology Declaration for MALIEV Microservices
# This file declares the explicit exchange/queue/binding topology.
# MassTransit can use this for declarative topology setup.
#
# Topology pattern:
#   - Exchanges: Topic exchanges per domain (maliev.{domain})
#   - Queues: Service-specific queues (maliev.{service}.{queuename})
#   - Bindings: Routing key patterns from exchanges to queues
#
# Generated from asyncapi/asyncapi.yaml channel definitions
# Format: YAML 1.1

exchanges:
