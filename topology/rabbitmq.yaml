bindings:
  # === Order Events → OrderService ===
  - exchange: maliev.orders
    queue: maliev.order-service
    routing_key: "events.*"

  # === Invoice Events ===
  - exchange: maliev.invoices
    queue: maliev.invoice-service
    routing_key: "events.*"

  # === Payment Events → PaymentService + Notification ===
  - exchange: maliev.payments
    queue: maliev.payment-service
    routing_key: "events.*"
  - exchange: maliev.payments
    queue: maliev.notification-critical
    routing_key: "events.payment-completed"

  # === Customer Events → CustomerService + Notification ===
  - exchange: maliev.customers
    queue: maliev.customer-service
    routing_key: "events.*"
  - exchange: maliev.customers
    queue: maliev.notification-standard
    routing_key: "events.customer-created"

  # === Quotation Events ===
  - exchange: maliev.quotations
    queue: maliev.quotation-service
    routing_key: "events.*"

  # === Receipt Events ===
  - exchange: maliev.receipts
    queue: maliev.receipt-service
    routing_key: "events.*"

  # === Material Events ===
  - exchange: maliev.materials
    queue: maliev.material-service
    routing_key: "events.*"

  # === Supplier Events ===
  - exchange: maliev.suppliers
    queue: maliev.supplier-service
    routing_key: "events.*"

  # === Purchase Order Events ===
  - exchange: maliev.purchase-orders
    queue: maliev.purchase-order-service
    routing_key: "events.*"

  # === Geometry Events → PricingService + QuotationService ===
  - exchange: maliev.geometry
    queue: maliev.geometry-service
    routing_key: "events.*"
  - exchange: maliev.geometry
    queue: maliev.pricing-service
    routing_key: "events.file-analyzed"
  - exchange: maliev.geometry
    queue: maliev.quotation-service
    routing_key: "events.file-analyzed"

  # === Upload Events ===
  - exchange: maliev.uploads
    queue: maliev.upload-service
    routing_key: "events.*"

  # === Job Events → InventoryService ===
  - exchange: maliev.jobs
    queue: maliev.job-service
    routing_key: "events.*"
  - exchange: maliev.jobs
    queue: maliev.inventory-service
    routing_key: "events.job-started"

  # === Inventory Events ===
  - exchange: maliev.inventory
    queue: maliev.inventory-service
    routing_key: "events.*"

  # === Delivery Events → Notification ===
  - exchange: maliev.delivery
    queue: maliev.delivery-service
    routing_key: "events.*"
  - exchange: maliev.delivery
    queue: maliev.notification-critical
    routing_key: "events.delivery-completed"

  # === Pricing Events ===
  - exchange: maliev.pricing
    queue: maliev.pricing-service
    routing_key: "events.*"

  # === Employee Events → HR Services ===
  - exchange: maliev.employee
    queue: maliev.employee-service
    routing_key: "events.*"
  - exchange: maliev.employee
    queue: maliev.career-service
    routing_key: "events.employee-created"
  - exchange: maliev.employee
    queue: maliev.compensation-service
    routing_key: "events.employee-created"
  - exchange: maliev.employee
    queue: maliev.compliance-service
    routing_key: "events.employee-created"
  - exchange: maliev.employee
    queue: maliev.performance-service
    routing_key: "events.employee-created"
  - exchange: maliev.employee
    queue: maliev.lifecycle-service
    routing_key: "events.employee-terminated"

  # === Leave Events ===
  - exchange: maliev.leave
    queue: maliev.leave-service
    routing_key: "events.*"

  # === Performance Events ===
  - exchange: maliev.performance
    queue: maliev.performance-service
    routing_key: "events.*"

  # === Lifecycle Events ===
  - exchange: maliev.lifecycle
    queue: maliev.lifecycle-service
