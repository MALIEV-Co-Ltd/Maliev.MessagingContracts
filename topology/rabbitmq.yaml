    queue: maliev.career-service
    routing_key: "events.*"

  # === Compensation Events ===
  - exchange: maliev.compensation
    queue: maliev.compensation-service
    routing_key: "events.*"

  # === Compliance Events ===
  - exchange: maliev.compliance
    queue: maliev.compliance-service
    routing_key: "events.*"

  # === Chatbot Events ===
  - exchange: maliev.chatbot
    queue: maliev.chatbot-service
    routing_key: "events.*"

  # === IAM Events ===
  - exchange: maliev.iam
    queue: maliev.iam-service
    routing_key: "events.*"

  # === PDF Events ===
  - exchange: maliev.pdf
    queue: maliev.pdf-service
    routing_key: "events.*"

  # === Auth Events ===
  - exchange: maliev.auth
    queue: maliev.auth-service
    routing_key: "events.*"

  # === Accounting Events ===
  - exchange: maliev.accounting
    queue: maliev.accounting-service
